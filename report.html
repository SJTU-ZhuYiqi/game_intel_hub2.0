<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周报详情 | Content Intel Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0f1f3d;
      --navy-2: #1a2f52;
      --accent: #3b82f6;
      --accent-2: #6366f1;
      --game-c: #2563eb;
      --game-bg: rgba(37,99,235,.06);
      --game-bd: rgba(37,99,235,.2);
      --drama-c: #7c3aed;
      --drama-bg: rgba(124,58,237,.06);
      --drama-bd: rgba(124,58,237,.2);
      --green:  #10b981;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --text:   #0f172a;
      --text-2: #374151;
      --text-3: #9ca3af;
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Nav ── */
    .site-nav {
      background: var(--navy);
      padding: 14px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-size: 12.5px;
      font-weight: 700;
      color: rgba(255,255,255,.8);
      text-decoration: none;
      letter-spacing: .06em;
    }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-back:hover { color: rgba(255,255,255,.85); }

    /* ── Hero ── */
    .report-hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 55%, #1e3a6a 100%);
      padding: 40px 0 44px;
      position: relative;
      overflow: hidden;
    }
    .report-hero::after {
      content: '';
      position: absolute;
      right: -60px; bottom: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(99,102,241,.1) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 28px;
      position: relative;
    }
    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .hero-badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .hero-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -.01em;
    }
    .hero-meta {
      display: flex;
      gap: 18px;
      font-size: 12px;
      color: rgba(255,255,255,.45);
      margin-bottom: 16px;
    }
    .hero-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .hero-tag {
      font-size: 11px;
      padding: 3px 11px;
      border-radius: 20px;
      background: rgba(255,255,255,.09);
      color: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.14);
    }

    /* ── Page Wrapper ── */
    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 28px 72px;
    }

    /* ── Insight Banner (核心结论) ── */
    .insight-banner {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      border-top: 4px solid var(--accent);
      box-shadow: 0 2px 16px rgba(59,130,246,.09);
      padding: 24px 28px 28px;
      margin-bottom: 36px;
    }
    .insight-banner-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .insight-banner-icon { font-size: 18px; }
    .insight-banner-titles {
      flex: 1;
      min-width: 0;
    }
    .insight-banner-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .insight-banner-sub {
      display: block;
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .insight-banner-meta {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .insight-sector-badge {
      font-size: 10.5px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .insight-sector-badge--game {
      background: var(--game-bg);
      color: var(--game-c);
      border: 1px solid var(--game-bd);
    }
    .insight-sector-badge--drama {
      background: var(--drama-bg);
      color: var(--drama-c);
      border: 1px solid var(--drama-bd);
    }

    /* ── Insight Sector Blocks (游戏 / 短剧 分栏) ── */
    .insight-sector-block {
      margin-bottom: 20px;
    }
    .insight-sector-block:last-child {
      margin-bottom: 0;
    }
    .insight-sector-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: 8px 8px 0 0;
      margin-bottom: 0;
      border-bottom: none;
    }
    .insight-sector-header--game {
      background: linear-gradient(90deg, var(--game-bg) 0%, transparent 100%);
      border: 1px solid var(--game-bd);
      border-bottom: none;
    }
    .insight-sector-header--drama {
      background: linear-gradient(90deg, var(--drama-bg) 0%, transparent 100%);
      border: 1px solid var(--drama-bd);
      border-bottom: none;
    }
    .insight-sector-icon { font-size: 15px; }
    .insight-sector-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .insight-sector-header--game .insight-sector-label { color: var(--game-c); }
    .insight-sector-header--drama .insight-sector-label { color: var(--drama-c); }
    .insight-sector-count {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      background: var(--bg-2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Insight card grid */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (max-width: 640px) {
      .insight-grid { grid-template-columns: 1fr; }
    }
    .insight-card {
      border-radius: 10px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--game-c);
      background: #fafbff;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .insight-card--drama { border-left-color: var(--drama-c); }
    .insight-card-head {}
    .insight-card-priority-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }
    .insight-priority-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .insight-priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
      letter-spacing: .03em;
    }
    .insight-card-label {
      font-size: 10.5px;
      color: var(--text-3);
      font-weight: 500;
    }
    .insight-sector-icon {
      margin-left: auto;
      font-size: 13px;
    }
    .insight-card-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .insight-card-body {
      font-size: 12.5px;
      color: var(--text-2);
      line-height: 1.7;
    }
    .insight-card-action {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--accent);
      margin-top: 2px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .insight-action-arrow {
      flex-shrink: 0;
      font-weight: 700;
    }

    /* Legacy fallback */
    .insight-section {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .insight-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .insight-section-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .insight-section-label--game { color: var(--game-c); }
    .insight-section-label--drama { color: var(--drama-c); }
    .insight-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .insight-dot--game { background: var(--game-c); }
    .insight-dot--drama { background: var(--drama-c); }
    .insight-items { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .insight-item {
      font-size: 13.5px; color: var(--text-2); line-height: 1.65;
      padding-left: 14px; position: relative;
    }
    .insight-item::before {
      content: ''; position: absolute; left: 0; top: 9px;
      width: 5px; height: 5px; border-radius: 50%; background: var(--text-3);
    }
    .insight-item strong { color: var(--text); }

    /* ── Industry Sections ── */
    .industry-section { margin-bottom: 40px; }

    .industry-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--card);
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--border);
      border-left: 5px solid var(--game-c);
    }
    .industry-header--drama { border-left-color: var(--drama-c); }
    .industry-icon { font-size: 22px; }
    .industry-info { flex: 1; }
    .industry-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .industry-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .industry-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      border: 1px solid var(--game-bd);
      color: var(--game-c);
      background: var(--game-bg);
    }
    .industry-pill--drama {
      color: var(--drama-c);
      background: var(--drama-bg);
      border-color: var(--drama-bd);
    }

    /* ── KPI Row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
      padding: 14px;
      background: var(--card);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .kpi-card {
      padding: 12px 14px;
      border-radius: 9px;
      background: var(--kpi-bg, #f8fafc);
      border: 1px solid rgba(0,0,0,.05);
    }
    .kpi-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--kpi-color, var(--game-c));
      line-height: 1.2;
      letter-spacing: -.01em;
    }
    .kpi-label {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.4;
    }
    .kpi-delta {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* ── Markdown Body ── */
    .markdown-body {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 28px 32px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-2);
    }
    .markdown-body h1 { display: none; }
    .markdown-body h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .markdown-body h3 {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      margin: 20px 0 10px;
    }
    .markdown-body p { margin-bottom: 13px; }
    .markdown-body ul, .markdown-body ol {
      margin: 8px 0 13px 22px;
    }
    .markdown-body li {
      margin-bottom: 5px;
      line-height: 1.7;
    }
    .markdown-body strong { color: var(--text); font-weight: 600; }
    .markdown-body em { font-style: italic; }
    .markdown-body a { color: var(--accent); text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body blockquote {
      margin: 14px 0;
      padding: 12px 18px;
      border-left: 3px solid var(--game-c);
      background: var(--game-bg);
      border-radius: 0 8px 8px 0;
      color: var(--text-2);
      font-size: 13.5px;
    }
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .markdown-body th {
      background: #102743;
      color: rgba(255,255,255,.88);
      font-weight: 600;
      padding: 9px 14px;
      text-align: left;
      font-size: 12.5px;
    }
    .markdown-body td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .markdown-body tr:last-child td { border-bottom: none; }
    .markdown-body tr:nth-child(even) td { background: #f8fafc; }
    .markdown-body code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      color: var(--accent-2);
    }
    /* ── Highlight Styles ── */
    .markdown-body .highlight-yellow {
      background: linear-gradient(180deg, transparent 60%, #fde68a 60%);
      padding: 0 2px;
      font-weight: 600;
    }
    .markdown-body .highlight-orange {
      background: linear-gradient(180deg, transparent 60%, #fed7aa 60%);
      padding: 0 2px;
      font-weight: 600;
    }
    .markdown-body .highlight-green {
      background: linear-gradient(180deg, transparent 60%, #bbf7d0 60%);
      padding: 0 2px;
      font-weight: 600;
    }
    .markdown-body .highlight-red {
      background: linear-gradient(180deg, transparent 60%, #fecaca 60%);
      padding: 0 2px;
      font-weight: 600;
    }
    .markdown-body .text-orange { color: #ea580c; font-weight: 700; }
    .markdown-body .text-green { color: #16a34a; font-weight: 700; }
    .markdown-body .text-red { color: #dc2626; font-weight: 700; }
    .markdown-body .text-blue { color: #2563eb; font-weight: 700; }
    .markdown-body .text-violet { color: #7c3aed; font-weight: 700; }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }

    /* Section-drama overrides */
    .section-drama .markdown-body blockquote {
      border-left-color: var(--drama-c);
      background: var(--drama-bg);
    }
    .section-drama .markdown-body a { color: var(--drama-c); }

    /* ── Callout (📌 style) ── */
    .md-callout {
      display: flex;
      gap: 10px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 14px 0;
      font-size: 13.5px;
      color: #78350f;
      line-height: 1.65;
    }
    .md-callout span { flex-shrink: 0; }
    .md-callout p { margin: 0; }

    /* ── Section Callout (小结) ── */
    .section-callout {
      display: flex;
      gap: 12px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 10px;
      padding: 14px 18px;
      margin: -1px 0 0;
      border-top: none;
      border-radius: 0;
      font-size: 13.5px;
      color: #0c4a6e;
      line-height: 1.65;
    }
    .section-callout-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }
    .section-callout-body {}
    .section-callout-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #0369a1;
      margin-bottom: 5px;
    }
    .section-drama .section-callout {
      background: #faf5ff;
      border-color: #ddd6fe;
      color: #3b0764;
    }
    .section-drama .section-callout-label { color: #7c3aed; }

    /* ── Footer ── */
    .page-footer {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }
    .page-footer a {
      padding: 10px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-2);
      text-decoration: none;
      transition: all .15s;
    }
    .page-footer a:hover {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    .site-footer {
      text-align: center;
      padding: 24px;
      font-size: 11.5px;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      .page-wrapper { padding: 20px 16px 60px; }
      .markdown-body { padding: 20px 16px; }
      .insight-banner { padding: 20px 18px; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">◈ CONTENT INTEL HUB</a>
      <a href="index.html" class="nav-back">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M11 7H3M6 4L3 7l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        返回首页
      </a>
    </div>
  </nav>

  <div class="report-hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">
        <span class="hero-badge">INDUSTRY BRIEF</span>
      </div>
      <div class="hero-title" id="hero-title">正在加载…</div>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-tags" id="hero-tags"></div>
    </div>
  </div>

  <div class="page-wrapper">
    <!-- 核心结论由 app.js 渲染至此 -->
    <div id="report-body"></div>

    <div class="page-footer">
      <a href="index.html">← 返回首页</a>
    </div>
  </div>

  <footer class="site-footer">内容消费研究组 · 数据仅供内部参考</footer>

  <script src="data.js?t=1745675000"></script>
  <script src="app.js?t=1745675000"></script>
</body>
</html>
